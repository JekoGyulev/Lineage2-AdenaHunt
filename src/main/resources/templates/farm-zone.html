<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Farm Zone</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/farm-zone.css">
</head>
<body>

<header class="farm-zone-header">
    <div class="zone-actions">
        <div class="player-adena">
            <img th:src="${currentPlayer.bannerImg}" alt="Adena">
            <span th:text="${currentPlayer.adena}"></span>
        </div>
        <a th:href="@{/lobby}" class="btn exit-zone">Exit Zone</a>
        <a th:href="@{/logout}" class="btn logout">Logout</a>
    </div>
</header>

<section class="farm-zone">

    <div class="mob-row">
        <h3 class="mob-row-title">Mobs Level 1–10</h3>
        <div class="mob-scroll-container">
            <div class="mob-entry" th:each="mob : ${mobs}" th:if="${mob.level >= 1 and mob.level <= 10}">
                <img class="mob-image" th:src="${mob.imageUrl}" alt="Gremlin"/>

                <div class="mob-info">

                    <div class="mob-header">
                        <span th:text="${mob.name}" class="mob-name"></span>
                        <span th:text="${mob.level + ' Lv'}" class="mob-level"></span>
                        <span th:if="${mob.type.displayName == 'Common'}" class="mob-type-tag common">Common</span>
                        <span th:if="${mob.type.displayName == 'Blue Champion'}" class="mob-type-tag blue">Blue Champion</span>
                        <span th:if="${mob.type.displayName == 'Red Champion'}" class="mob-type-tag red">Red Champion</span>
                    </div>

                    <div class="mob-meta">
                        <span th:text="${#temporals.format(mob.createdOn, 'HH:mm:ss')}" class="spawn-time"></span>
                        <span th:text="${mob.spawnArea}" class="mob-area-tag"></span>
                        <span th:if="${!mob.alive}" class="mob-status defeated">Defeated</span>
                        <span th:if="${mob.alive}" class="mob-status alive">Alive</span>
                    </div>

                    <div class="mob-stats">
                        <span>Health: <strong th:text="${#numbers.formatDecimal(mob.health, 1, 0)}"></strong></span>
                        <span>Attack: <strong th:text="${#numbers.formatDecimal(mob.attack, 1, 0)}"></strong></span>
                        <span>Defense: <strong th:text="${#numbers.formatDecimal(mob.defense, 1, 0)}"></strong></span>
                    </div>

                    <div class="mob-drop">
                        <div class="drop-item">
                            <img src="/images/adena-icon.png" alt="Adena"/>
                            <span th:text="${mob.adenaDrop}"></span>
                        </div>
                        <div class="drop-item">
                            <img src="/images/xp-booster-icon.png" alt="XP"/>
                            <span th:text="${mob.xpDrop + 'XP'}"></span>
                        </div>
                    </div>

                    <div th:text="${mob.description}" class="mob-description"></div>

                    <form class="attack-button-form" th:action="@{'/mobs/' + ${mob.id}}" th:method="PATCH">
                        <button th:if="${!mob.alive}" type="submit" class="btn defeated-mob-btn" disabled>Defeated</button>
                        <button th:if="${mob.alive}" type="submit" class="btn">Attack</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="mob-row">
        <h3 class="mob-row-title">Mobs Level 11–20</h3>
        <div class="mob-scroll-container">
            <div class="mob-entry" th:each="mob : ${mobs}" th:if="${mob.level >= 11 and mob.level <= 20}">
                <img class="mob-image" th:src="${mob.imageUrl}" alt="Gremlin"/>

                <div class="mob-info">

                    <div class="mob-header">
                        <span th:text="${mob.name}" class="mob-name"></span>
                        <span th:text="${mob.level + ' Lv'}" class="mob-level"></span>
                        <span th:if="${mob.type.displayName == 'Common'}" class="mob-type-tag common">Common</span>
                        <span th:if="${mob.type.displayName == 'Blue Champion'}" class="mob-type-tag blue">Blue Champion</span>
                        <span th:if="${mob.type.displayName == 'Red Champion'}" class="mob-type-tag red">Red Champion</span>
                    </div>

                    <div class="mob-meta">
                        <span th:text="${#temporals.format(mob.createdOn, 'HH:mm:ss')}" class="spawn-time"></span>
                        <span th:text="${mob.spawnArea}" class="mob-area-tag"></span>
                        <span th:if="${!mob.alive}" class="mob-status defeated">Defeated</span>
                        <span th:if="${mob.alive}" class="mob-status alive">Alive</span>
                    </div>

                    <div class="mob-stats">
                        <span>Health: <strong th:text="${#numbers.formatDecimal(mob.health, 1, 0)}"></strong></span>
                        <span>Attack: <strong th:text="${#numbers.formatDecimal(mob.attack, 1, 0)}"></strong></span>
                        <span>Defense: <strong th:text="${#numbers.formatDecimal(mob.defense, 1, 0)}"></strong></span>
                    </div>

                    <div class="mob-drop">
                        <div class="drop-item">
                            <img src="/images/adena-icon.png" alt="Adena"/>
                            <span th:text="${mob.adenaDrop}"></span>
                        </div>
                        <div class="drop-item">
                            <img src="/images/xp-booster-icon.png" alt="XP"/>
                            <span th:text="${mob.xpDrop + 'XP'}"></span>
                        </div>
                    </div>

                    <div th:text="${mob.description}" class="mob-description"></div>

                    <form class="attack-button-form" th:action="@{'/mobs/' + ${mob.id} }" th:method="PATCH">
                        <button th:if="${!mob.alive}" type="submit" class="btn defeated-mob-btn" disabled>Defeated</button>
                        <button th:if="${mob.alive}" type="submit" class="btn">Attack</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Fight Result -->
<div th:if="${fightResult}" id="fight-result-modal" class="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>

        <h3 class="modal-title">Fight Result</h3>

        <!-- Victory or Loss badge -->
        <div th:if="${fightResult.outcome.name() == 'PLAYER_WIN'}" class="fight-outcome-badge victory">Victory</div>
        <!-- or -->
        <div th:if="${fightResult.outcome.name() == 'MOB_WIN'}" class="fight-outcome-badge loss">Loss</div>

        <div class="fight-summary">
            <div class="summary-row">
                <span class="label">Mob:</span>
                <span th:text="${fightResult.mobName}" class="value"></span>
            </div>
            <div class="summary-row">
                <span class="label">Adena Gained:</span>
                <span th:text="${fightResult.adenaEarned}" class="value"></span>
            </div>
            <div class="summary-row">
                <span class="label">XP Gained:</span>
                <span th:text="${fightResult.xpEarned}" class="value"></span>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/commons::footer}"></footer>

<script>
    function closeModal() {
      document.getElementById('fight-result-modal').classList.add('hidden');
    }
</script>

</body>
</html>
